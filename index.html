<!DOCTYPE html>
<html>
<head>
  <title>Physarum Card</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { width: 1024px; height: 1024px; }
    #status { position: fixed; top: 10px; left: 10px; color: #fff; font-family: monospace; font-size: 12px; }

    #controls {
      position: fixed;
      top: 0;
      right: 0;
      width: 260px;
      height: 100vh;
      background: #111;
      color: #ccc;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      padding: 12px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 100;
      border-left: 1px solid #333;
    }
    #controls.hidden { display: none; }
    #controls h3 {
      margin: 0 0 8px 0;
      color: #fff;
      font-size: 13px;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
    }
    .control-row {
      margin-bottom: 6px;
    }
    .control-row label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .control-row label .val {
      color: #8cf;
    }
    .control-row input[type="range"] {
      width: 100%;
      height: 14px;
      cursor: pointer;
      accent-color: #8cf;
    }
    #controls button {
      width: 100%;
      padding: 6px;
      margin-top: 8px;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    #controls button:hover {
      background: #444;
    }
    #controls .hint {
      color: #666;
      font-size: 10px;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="status">Initializing WebGPU...</div>
  <canvas id="canvas" width="1024" height="1024"></canvas>

  <div id="controls">
    <h3>Physarum Controls</h3>

    <div class="control-row">
      <label><span>Look Slices</span><span class="val" id="look-slices-val">7</span></label>
      <input type="range" id="look-slices" min="1" max="16" step="1" value="7">
    </div>
    <div class="control-row">
      <label><span>Look Radians</span><span class="val" id="look-radians-val">1.05</span></label>
      <input type="range" id="look-radians" min="0.1" max="3.14" step="0.05" value="1.05">
    </div>
    <div class="control-row">
      <label><span>Look Distance</span><span class="val" id="look-distance-val">24</span></label>
      <input type="range" id="look-distance" min="1" max="50" step="1" value="24">
    </div>
    <div class="control-row">
      <label><span>Dir Momentum</span><span class="val" id="dir-momentum-val">0.1</span></label>
      <input type="range" id="dir-momentum" min="0" max="1" step="0.01" value="0.1">
    </div>
    <div class="control-row">
      <label><span>Dir Random</span><span class="val" id="dir-random-val">0.3</span></label>
      <input type="range" id="dir-random" min="0" max="2" step="0.01" value="0.3">
    </div>
    <div class="control-row">
      <label><span>Max Speed</span><span class="val" id="max-speed-val">0.08</span></label>
      <input type="range" id="max-speed" min="0.0" max="1" step="0.01" value="0.08">
    </div>
    <div class="control-row">
      <label><span>Min Speed</span><span class="val" id="min-speed-val">0.05</span></label>
      <input type="range" id="min-speed" min="0" max="1" step="0.01" value="0">
    </div>
    <div class="control-row">
      <label><span>Intensity</span><span class="val" id="intensity-val">0.01</span></label>
      <input type="range" id="intensity" min="0.01" max="0.1" step="0.01" value="0.01">
    </div>
    <div class="control-row">
      <label><span>HSV Angles</span><span class="val" id="hsv-angles-val">7</span></label>
      <input type="range" id="hsv-angles" min="0" max="16" step="1" value="7">
    </div>
    <div class="control-row">
      <label><span>HSV Offset</span><span class="val" id="hsv-offset-val">0.05</span></label>
      <input type="range" id="hsv-offset" min="0" max="1" step="0.01" value="0.05">
    </div>
    <div class="control-row">
      <label><span>Fade Decrement</span><span class="val" id="fade-dec-val">0.004</span></label>
      <input type="range" id="fade-dec" min="0" max="0.05" step="0.001" value="0.004">
    </div>
    <div class="control-row">
      <label><span>Blur Multiplier</span><span class="val" id="blur-mult-val">0</span></label>
      <input type="range" id="blur-mult" min="0" max="10" step="0.5" value="0">
    </div>
    <div class="control-row">
      <label><span>Blur Interval</span><span class="val" id="blur-interval-val">4</span></label>
      <input type="range" id="blur-interval" min="1" max="32" step="1" value="4">
    </div>
    <div class="control-row">
      <label><span>Spawn Offset</span><span class="val" id="spawn-offset-val">0</span></label>
      <input type="range" id="spawn-offset" min="0" max="20" step="0.5" value="0">
    </div>
    <div class="control-row">
      <label><span>Density</span><span class="val" id="density-val">5</span></label>
      <input type="range" id="density" min="0.1" max="5" step="0.1" value="5">
    </div>

    <button id="btn-reset">Reset Simulation</button>

    <div class="hint">Press H to toggle controls</div>
  </div>

  <script type="module" src="physarum.js"></script>
</body>
</html>
